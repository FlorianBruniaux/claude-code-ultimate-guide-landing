name: Link Check

on:
  schedule:
    # Run on the 1st of each month at 08:00 UTC
    - cron: "0 8 1 * *"
  # Also run after each deploy
  workflow_run:
    workflows: ["Deploy Astro site to GitHub Pages"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    # Only run post-deploy check if the deploy succeeded
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check links on cc.bruniaux.com
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --timeout 30
            --max-retries 3
            --accept 200,206,429
            --exclude "^mailto:"
            --exclude "^https://twitter\\.com"
            --exclude "^https://x\\.com"
            --exclude "^https://linkedin\\.com"
            --exclude "^https://www\\.linkedin\\.com"
            --exclude "^https://localhost"
            https://cc.bruniaux.com
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links detected on cc.bruniaux.com"
          content-filepath: ./lychee/out.md
          labels: |
            bug
            broken-links
